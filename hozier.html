<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>University of Toronto</title>
    <link rel="icon" type="image/x-icon" href="static/assets/favicon.ico" />
    <style>
        :root {
            --accent: #277C5E;
            --accent-dark: #1E5F47;
            --ink: #1f2d3a;
            --frame: #d7e3dc;
            --surface: #ffffff;
            --page: #f7faf8;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            color: var(--ink);
            background: var(--page);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        main {
            width: min(900px, 100%);
        }

        .top-bar {
            display: flex;
            justify-content: flex-start;
            margin-bottom: 1rem;
        }

        .frame {
            overflow: hidden;
            min-height: min(72vh, 720px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .frame img {
            display: block;
            max-width: 100%;
            max-height: min(68vh, 680px);
            width: auto;
            height: auto;
            object-fit: contain;
        }

        .placeholder {
            display: none;
            text-align: center;
            color: #587087;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.45rem 0.8rem;
            border-radius: 999px;
            text-decoration: none;
            color: var(--accent);
            border: 1.5px solid var(--accent);
            background: transparent;
            font-size: 0.92rem;
        }

        .back-link:hover {
            color: var(--accent-dark);
            border-color: var(--accent-dark);
        }

        @media (max-width: 700px) {
            body {
                padding: 1rem;
            }

            .frame {
                min-height: 50vh;
                padding: 0.75rem;
            }
        }
    </style>
</head>

<body>
<main>
    <div class="top-bar">
        <a class="back-link" href="index.html">Back</a>
    </div>

    <figure class="frame">
        <img id="uoft-image" src="static/assets/img/hozier.jpg" alt="University of Toronto campus" />
        <figcaption id="uoft-placeholder" class="placeholder">Images unavailable.</figcaption>
    </figure>
</main>

<script>
    const image = document.getElementById('uoft-image');
    const placeholder = document.getElementById('uoft-placeholder');

    function showPlaceholder() {
        image.style.display = 'none';
        placeholder.style.display = 'block';
    }

    image.addEventListener('error', showPlaceholder);
</script>
</body>

</html>
